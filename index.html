<style>
  :root {
    --eg-green:      #7ab527;
    --eg-blue:       #3d9bd4;

    --eg-green-dark: #5a8a1a;
    --eg-blue-dark:  #2a72a0;

    --bg1:         #e8f5d0;
    --bg2:         #cce8a0;
    --card:        rgba(255,255,255,0.60);
    --card-border: rgba(122,181,39,0.35);
    --text:        #1e3a05;
    --subtext:     #3d6b10;
    --link:        #2a72a0;
    --glow:        rgba(122,181,39,0.35);
    --footer-color:#4a7515;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    min-height: 100%;
    background: linear-gradient(145deg, var(--bg1) 0%, var(--bg2) 100%);
    background-attachment: fixed;
  }
  body {
    font-family: 'DM Sans', sans-serif;
    color: var(--text);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 32px 16px;
    position: relative;
    overflow-x: hidden;
  }

  .pixel-canvas {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }

  .circuit-lines {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    opacity: 0.12;
  }
  .circuit-lines svg { width: 100%; height: 100%; }

  .glass-card {
    position: relative;
    z-index: 10;
    background: var(--card);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    border: 1px solid var(--card-border);
    border-radius: 24px;
    padding: 40px 32px 36px;
    max-width: 460px;
    width: 100%;
    box-shadow:
      0 0 0 1px var(--card-border),
      0 8px 40px rgba(0,0,0,0.12),
      0 2px 8px rgba(0,0,0,0.06);
    animation: float 7s ease-in-out infinite;
  }
  .glass-card::before {
    content: '';
    position: absolute;
    inset: -14px;
    background: var(--glow);
    border-radius: 38px;
    z-index: -1;
    filter: blur(24px);
    opacity: 0.6;
  }

  @keyframes float {
    0%,100% { transform: translateY(0px); }
    50%      { transform: translateY(-8px); }
  }

  .container {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
  }

  .avatar-wrap {
    position: relative;
    margin-bottom: 16px;
  }
  .avatar-ring {
    position: absolute;
    inset: -5px;
    border-radius: 50%;
    background: conic-gradient(
      var(--eg-green)  0deg 120deg,
      var(--eg-blue)   120deg 240deg,
      var(--eg-orange) 240deg 360deg
    );
    animation: spin-ring 8s linear infinite;
    z-index: -1;
  }
  @keyframes spin-ring { to { transform: rotate(360deg); } }

  img.avatar {
    width: 130px;
    height: 130px;
    border-radius: 50%;
    object-fit: cover;
    border: 4px solid rgba(255,255,255,0.95);
    box-shadow: 0 4px 20px rgba(0,0,0,0.18);
    display: block;
    position: relative;
  }

  h1 {
    font-family: 'Space Mono', monospace;
    font-size: 1.25rem;
    letter-spacing: -0.01em;
    color: var(--text);
    margin-top: 4px;
    margin-bottom: 2px;
    line-height: 1.3;
  }

  .role-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: linear-gradient(135deg, var(--eg-green), var(--eg-blue));
    color: #fff;
    font-size: 0.78rem;
    font-weight: 600;
    padding: 4px 14px;
    border-radius: 999px;
    margin: 10px 0 14px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    box-shadow: 0 2px 8px rgba(61,155,212,0.3);
  }

  .org-block { margin-bottom: 12px; }
  .org-name {
    font-family: 'Space Mono', monospace;
    font-size: 0.9rem;
    font-weight: 700;
    color: var(--eg-green-dark);
    letter-spacing: 0.02em;
    margin-bottom: 3px;
  }
  .dept {
    font-size: 0.82rem;
    color: var(--subtext);
    line-height: 1.5;
  }

  .divider {
    width: 100%;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--card-border), transparent);
    margin: 14px 0;
  }

  .contact-list {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 9px;
    margin-bottom: 4px;
  }
  .contact-row {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 0.88rem;
    color: var(--subtext);
  }
  .contact-row .icon-dot {
    width: 30px;
    height: 30px;
    flex-shrink: 0;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.9rem;
    background: rgba(122,181,39,0.12);
  }
  .contact-row a {
    color: var(--link);
    text-decoration: none;
  }
  .contact-row a:hover { text-decoration: underline; }

  .wa-badge {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    background: rgba(37,211,102,0.15);
    color: #1da851;
    font-size: 0.68rem;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 999px;
    margin-left: 6px;
    letter-spacing: 0.04em;
    vertical-align: middle;
  }

  .save-btn {
    margin-top: 20px;
    width: 100%;
    background: linear-gradient(135deg, var(--eg-green) 0%, var(--eg-blue) 100%);
    color: #fff;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.98rem;
    font-weight: 600;
    border: none;
    border-radius: 14px;
    padding: 15px 28px;
    cursor: pointer;
    letter-spacing: 0.02em;
    box-shadow: 0 4px 18px rgba(122,181,39,0.35);
    transition: transform 0.18s, box-shadow 0.18s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .save-btn:hover {
    transform: translateY(-2px) scale(1.01);
    box-shadow: 0 8px 28px rgba(61,155,212,0.4);
  }
  .save-btn:active { transform: scale(0.98); }

  footer {
    margin-top: 16px;
    font-size: 0.72rem;
    color: var(--footer-color);
    opacity: 0.75;
    letter-spacing: 0.04em;
    text-align: center;
    width: 100%;
  }
</style>

(function() {
  const canvas = document.getElementById('pixelCanvas');
  const colors = ['#7ab527','#3d9bd4','#f5a800','#5a8a1a','#2a72a0'];
  const sizes  = [8, 12, 16, 20];

  /* Inject keyframes for pixel drift into a <style> tag */
  const style = document.createElement('style');
  let kfCSS = '';
  const VARIANTS = 12;
  for (let v = 0; v < VARIANTS; v++) {
    const dx1 = (Math.random()*60-30).toFixed(1);
    const dy1 = (Math.random()*60-30).toFixed(1);
    const dx2 = (Math.random()*60-30).toFixed(1);
    const dy2 = (Math.random()*60-30).toFixed(1);
    const dx3 = (Math.random()*60-30).toFixed(1);
    const dy3 = (Math.random()*60-30).toFixed(1);
    const r1  = (Math.random()*20-10).toFixed(1);
    const r2  = (Math.random()*20-10).toFixed(1);
    kfCSS += `
    @keyframes px${v} {
      0%   { transform: translate(0px, 0px) rotate(0deg); }
      25%  { transform: translate(${dx1}px, ${dy1}px) rotate(${r1}deg); }
      50%  { transform: translate(${dx2}px, ${dy2}px) rotate(${r2}deg); }
      75%  { transform: translate(${dx3}px, ${dy3}px) rotate(${r1}deg); }
      100% { transform: translate(0px, 0px) rotate(0deg); }
    }`;
  }
  /* Circuit layer slow drift */
  kfCSS += `
  @keyframes circuitDrift {
    0%   { transform: translate(0px,   0px)   rotate(0deg); }
    33%  { transform: translate(18px,  12px)  rotate(0.4deg); }
    66%  { transform: translate(-12px, 20px)  rotate(-0.3deg); }
    100% { transform: translate(0px,   0px)   rotate(0deg); }
  }
  .circuit-lines { animation: circuitDrift 28s ease-in-out infinite; }
  `;
  style.textContent = kfCSS;
  document.head.appendChild(style);

  /* Build SVG with individually animating pixel rects */
  const svgNS = 'http://www.w3.org/2000/svg';
  const svg   = document.createElementNS(svgNS, 'svg');
  svg.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;overflow:visible';

  for (let i = 0; i < 55; i++) {
    const r    = document.createElementNS(svgNS,'rect');
    const s    = sizes[Math.floor(Math.random()*sizes.length)];
    const v    = Math.floor(Math.random()*VARIANTS);
    const dur  = (14 + Math.random()*18).toFixed(1);
    const del  = (Math.random()*12).toFixed(1);

    r.setAttribute('x',      (Math.random()*98)+'%');
    r.setAttribute('y',      (Math.random()*98)+'%');
    r.setAttribute('width',  s);
    r.setAttribute('height', s);
    r.setAttribute('rx',     2);
    r.setAttribute('fill',   colors[Math.floor(Math.random()*colors.length)]);
    r.setAttribute('opacity',(0.08+Math.random()*0.11).toFixed(2));
    r.style.animation = `px${v} ${dur}s ${del}s ease-in-out infinite`;
    r.style.transformBox      = 'fill-box';
    r.style.transformOrigin   = 'center';
    svg.appendChild(r);
  }
  canvas.appendChild(svg);
})();
